services:
  cli-proxy-api:
    image: cli-proxy-api-local:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-local}
        COMMIT: ${COMMIT:-local-modified}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api-local
    command: ["./CLIProxyAPI", "-config", "/CLIProxyAPI/config.docker.yaml", "-no-browser"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      DEPLOY: ${DEPLOY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8317:11451"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ./config.docker.yaml:/CLIProxyAPI/config.docker.yaml:ro
      - ./auths:/CLIProxyAPI/auths
      - ./logs:/CLIProxyAPI/logs
      - ./static:/CLIProxyAPI/static
    restart: unless-stopped
